<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHAT DO YOU THINK.HTML</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .home-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .home-btn:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Write a Comment</h2>

    <textarea id="comment" placeholder="Type your comment here..."></textarea>

    <button onclick="saveComment()">Submit Comment</button>

    <!-- Home Button -->
    <a href="ABAUT.HTML" class="home-btn">Home</a>
  </div>

  <script>
    function saveComment() {
      let comment = document.getElementById("comment").value;

      if(comment.trim() === "") {
        alert("Please write a comment.");
        return;
      }

      // Get existing comments
      let comments = JSON.parse(localStorage.getItem("comments")) || [];

      // Add new comment
      comments.push(comment);

      // Save back to localStorage
      localStorage.setItem("comments", JSON.stringify(comments));

      // Go to second page
      window.location.href = "MESSAGE DISPLAY.HTML";
    }
  </script>

</body>
</html>
