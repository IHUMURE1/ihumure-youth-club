<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Comments</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .comment {
      background: #f1f1f1;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .btn {
      display: block;
      width: 200px;
      margin: 20px auto 0;
      text-align: center;
      background: #007bff;
      color: white;
      padding: 12px;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>User Comments</h2>

    <div id="commentsList"></div>

    <a href="WHAT%20DO%20YOU%20THINK.HTML" class="btn">Add New Comment</a>
  </div>

  <script>
    let comments = JSON.parse(localStorage.getItem("comments")) || [];

    let commentsList = document.getElementById("commentsList");

    if(comments.length === 0) {
      commentsList.innerHTML = "<p>No comments available.</p>";
    } else {
      comments.forEach(comment => {
        let div = document.createElement("div");
        div.className = "comment";
        div.textContent = comment;

        commentsList.appendChild(div);
      });
    }
  </script>

</body>
</html>
